spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456 # 你之前 docker run 设置的密码
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create # 首次启动用 create，表创建成功后改回 update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

